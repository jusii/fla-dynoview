name: release

# Cut a release:  git tag app-v0.1.2 && git push origin app-v0.1.2
# One job creates the release, the build matrix uploads to it (via releaseId, so
# no duplicate-release race), then it is published automatically.
on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create the draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `FLA Dynoview ${tag}`,
              body: [
                'Unsigned builds — see the README for first-launch instructions:',
                '- macOS: right-click the app → Open (once), or `xattr -cr` it.',
                '- Windows: SmartScreen → More info → Run anyway.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel (x86_64), cross-compiled on the arm runner
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04 # Linux x64 (widest glibc/webkit compatibility)
            args: ""
          - platform: windows-latest # Windows x64
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf xdg-utils build-essential file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # The macOS runner needs both targets; keep Windows/Linux lean.
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
